client
dev tun
proto udp
tun-mtu 1400
mssfix
script-security 2
up /usr/local/sbin/tun0-policy.sh
down /usr/local/sbin/tun0-policy.sh
## HINWEIS:
## Wenn Sie hier anstelle des Hostnames eine IP-Adresse eintragen,
## nutzen Sie bitte möglichst alle IP-Adressen, welche Sie bei der Abfrage des Namens zurückerhalten.
## Wiederholen Sie dann für jede IP-Adresse die Zeile "remote A.B.C.D 1194"
remote openvpn.tp1.tunneleinwahl.de 1194
#dhcp-option DNS 188.246.0.34
auth-retry interact
resolv-retry infinite
nobind
persist-key
persist-tun
remote-cert-tls server
explicit-exit-notify 1
ping 5
ping-restart 25
cipher AES-128-GCM
## Debug-Ausgabe aktivieren
verb 3
## Zugangsdaten abfragen und nicht aus einer Datei lesen
#auth-user-pass
auth-user-pass /etc/openvpn/portunity.login
ca /etc/openvpn/ca.crt
tls-auth /etc/openvpn/ta.key 1
## Zugangsdaten aus einer Datei lesen
#auth-user-pass portunity.login
## Den Tunnel als Standardgateway nutzen.
## Eine Alternative dazu ist Policy Based Routing (PBR),
## zu finden in unserem Wiki unter folgendem Link:
## http://www.portunity.de/access/wiki/PBR_%28Policy_Based_Routing%29
#redirect-gateway
#route-nopull
pull-filter ignore "redirect-gateway"
route 188.246.4.33 255.255.255.255
## Auch IPv6-Traffic routen
#route-ipv6 ::0/0
key-direction 1
