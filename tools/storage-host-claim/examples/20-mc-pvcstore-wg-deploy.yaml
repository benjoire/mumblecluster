apiVersion: apps/v1
kind: Deployment
metadata:
  name: mc-pvcstore-wg-nfs-provisioner
  namespace: mc-pvcstore
  # Seed manifest only. Active NFS_SERVER is runtime-patched by storage-host-claim.
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mc-pvcstore-wg-nfs-provisioner
  template:
    metadata:
      labels:
        app: mc-pvcstore-wg-nfs-provisioner
    spec:
      serviceAccountName: mc-pvcstore-nfs-provisioner
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: nfs-subdir-external-provisioner
          image: registry.k8s.io/sig-storage/nfs-subdir-external-provisioner:v4.0.2
          imagePullPolicy: IfNotPresent
          env:
            - name: PROVISIONER_NAME
              value: mumblecluster.io/mc-pvcstore-wg
            - name: NFS_SERVER
              value: "REPLACE_ACTIVE_NFS_SERVER"
            - name: NFS_PATH
              value: /srv/mc-pvcstore
          volumeMounts:
            - name: nfs-client-root
              mountPath: /persistentvolumes
      volumes:
        - name: nfs-client-root
          nfs:
            server: "REPLACE_ACTIVE_NFS_SERVER"
            path: /srv/mc-pvcstore
